// Tab switching
function switchView(view) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (view === 'chart') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('chartView').classList.add('active');
    drawChart();
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('listView').classList.add('active');
  }
}

// === Chart ===
let canvas, ctx;
let selectedCluster = null;

function drawChart() {
  canvas = document.getElementById('scatter');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  render();
}

function render() {
  const w = canvas.width / 2, h = canvas.height / 2;
  ctx.clearRect(0, 0, w, h);

  const xs = points.map(p => p.x), ys = points.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const pad = 20;
  const scaleX = (w - pad*2) / (maxX - minX || 1);
  const scaleY = (h - pad*2) / (maxY - minY || 1);

  points.forEach(p => {
    const info = clusters[p.c] || clusters[-1] || {color: '#ccc'};
    const isSelected = selectedCluster === null || selectedCluster === p.c;
    ctx.globalAlpha = isSelected ? 0.8 : 0.1;
    ctx.fillStyle = info.color;
    ctx.beginPath();
    ctx.arc(pad + (p.x - minX) * scaleX, pad + (p.y - minY) * scaleY, isSelected ? 5 : 3, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Store coords for tap detection
  canvas._coords = points.map(p => ({
    px: pad + (p.x - minX) * scaleX,
    py: pad + (p.y - minY) * scaleY,
    c: p.c,
    t: p.t,
  }));
}

// Tap handling (no zoom!)
document.getElementById('scatter')?.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const tooltip = document.getElementById('tooltip');

  let closest = null, minDist = 20;
  (canvas._coords || []).forEach(p => {
    const d = Math.sqrt((p.px - x)**2 + (p.py - y)**2);
    if (d < minDist) { minDist = d; closest = p; }
  });

  if (closest) {
    tooltip.innerHTML = closest.t;
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(e.clientX + 10, window.innerWidth - 290) + 'px';
    tooltip.style.top = (e.clientY - 50) + 'px';
    setTimeout(() => tooltip.style.display = 'none', 3000);
  } else {
    tooltip.style.display = 'none';
  }
});

// Legend
function buildLegend() {
  const el = document.getElementById('legend');
  let html = '<div class="legend-item active" onclick="filterCluster(null)" data-c="all"><span class="dot" style="background:#333"></span>全て</div>';
  Object.entries(clusters).forEach(([cid, info]) => {
    if (parseInt(cid) === -1) return;
    html += `<div class="legend-item" onclick="filterCluster(${cid})" data-c="${cid}"><span class="dot" style="background:${info.color}"></span>${info.label} (${info.count})</div>`;
  });
  el.innerHTML = html;
}

function filterCluster(cid) {
  selectedCluster = cid;
  document.querySelectorAll('.legend-item').forEach(el => {
    const dc = el.dataset.c;
    el.classList.toggle('active', dc === 'all' ? cid === null : parseInt(dc) === cid);
  });
  render();
}

// === List ===
function buildList() {
  const el = document.getElementById('clusterList');
  let h = '';
  Object.entries(clusters).sort((a,b) => b[1].count - a[1].count).forEach(([cid, info]) => {
    if (parseInt(cid) === -1) return;
    h += `<div class="cluster-section">
      <div class="cluster-header" onclick="toggleCluster(this)">
        <div class="dot" style="background:${info.color}"></div>
        <div class="info"><div class="label">${info.label}</div><div class="count">${info.count}件のツイート</div></div>
        <div class="arrow">▶</div>
      </div>
      <div class="tweet-list">`;
    info.tweets.forEach(t => {
      h += `<div class="tweet-card">
        <div class="opinion">${escHtml(t.opinion)}</div>
        <div class="original">${escHtml(t.text)}</div>
        <div class="meta"><span>@${t.user}</span><span>♥${t.likes}</span><span>🔁${t.rt}</span><span>👁${t.imp.toLocaleString()}</span></div>
      </div>`;
    });
    h += '</div></div>';
  });
  el.innerHTML = h;
}

function toggleCluster(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Init
buildLegend();
buildList();
drawChart();
</script>
